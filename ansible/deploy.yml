---
# Play 1: Ensure infrastructure exists via Terraform
- name: Ensure infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run terraform init
      ansible.builtin.command:
        cmd: terraform -chdir=../terraform init -input=false
      register: terraform_init
      changed_when: "'Terraform has been successfully initialized' in terraform_init.stdout"

    - name: Get current public IP
      ansible.builtin.uri:
        url: https://checkip.amazonaws.com
        return_content: true
      register: my_ip

    - name: Run terraform apply
      ansible.builtin.command:
        cmd: >-
          terraform -chdir=../terraform apply -auto-approve
          -var=ssh_cidr={{ my_ip.content | trim }}/32
      register: terraform_apply
      changed_when: "'Apply complete' in terraform_apply.stdout"

    - name: Get EC2 public IP
      ansible.builtin.command:
        cmd: terraform -chdir=../terraform output -raw public_ip
      register: ec2_ip
      changed_when: false

    - name: Get SSH key path
      ansible.builtin.command:
        cmd: terraform -chdir=../terraform output -raw ssh_private_key_file
      register: ssh_key_path
      changed_when: false

    - name: Show target host
      ansible.builtin.debug:
        msg: "Deploying to {{ ec2_ip.stdout }}"

    - name: Add EC2 host
      ansible.builtin.add_host:
        name: "{{ ec2_ip.stdout }}"
        groups: ec2
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "{{ ssh_key_path.stdout }}"

# Play 2: Deploy the app on the EC2 instance
- name: Deploy app
  hosts: ec2
  gather_facts: false
  become: true
  tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Install Docker and Git
      ansible.builtin.dnf:
        name:
          - docker
          - git
        state: present

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Check if repo exists
      ansible.builtin.stat:
        path: /opt/typespeed/.git
      register: repo_dir

    - name: Clone repo
      ansible.builtin.git:
        repo: https://github.com/tomassavukaitis/typespeed.git
        dest: /opt/typespeed
        version: main
      when: not repo_dir.stat.exists

    - name: Pull latest code
      ansible.builtin.command:
        cmd: git pull origin main
        chdir: /opt/typespeed
      register: git_pull
      changed_when: "'Already up to date' not in git_pull.stdout"
      when: repo_dir.stat.exists

    - name: Build Docker image
      community.docker.docker_image:
        name: typespeed
        source: build
        build:
          path: /opt/typespeed
        force_source: true

    - name: Remove old container
      community.docker.docker_container:
        name: typespeed
        state: absent

    - name: Start new container
      community.docker.docker_container:
        name: typespeed
        image: typespeed
        state: started
        restart_policy: always
        ports:
          - "80:80"

    - name: Show app URL
      ansible.builtin.debug:
        msg: "App is live at http://{{ inventory_hostname }}"
